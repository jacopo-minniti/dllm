# Keyword Mappings and Shortcuts for Datasets, Models, and Parameters
# These simplify your config files by setting common values with a single word.

datasets:
  tulu: "allenai/tulu-3-sft-mixture[train:50000,test:50000:52000]"
  numina: "jacopo-minniti/NuminaMath-CoT-LLaDA-Goldilocks[train:50000,test:2000]"

models:
  llada-8b: "GSAI-ML/LLaDA-8B-Base"
  llada-instruct: "GSAI-ML/LLaDA-8B-Instruct"
  fast-dllm: "Efficient-Large-Model/Fast_dLLM_v2_1.5B"
  dream-7b: "Dream-org/Dream-v0-Base-7B"
  dream-7b-instruct: "Dream-org/Dream-v0-Instruct-7B"

# Shortcuts: When these keys are found in your YAML, they are expanded
# into the specified set of parameters.
shortcuts:
  # Model Shortcuts (Sets both name and default training script)
  model:
    llada-8b:
      model_name_or_path: "llada-8b"
      script_path: "examples/llada/sft.py"
    llada-instruct:
      model_name_or_path: "llada-instruct"
      script_path: "examples/llada/sft.py"
    fast-dllm:
      model_name_or_path: "fast-dllm"
      script_path: "examples/fastdllm_v2/sft.py"
    dream-7b:
      model_name_or_path: "dream-7b"
      script_path: "examples/dream/sft.py"
    dream-7b-instruct:
      model_name_or_path: "dream-7b-instruct"
      script_path: "examples/dream/sft.py"

  # Evaluation Model Shortcuts (Sets name and evaluation script)
  eval_model:
    llada-8b:
      model: "llada"
      script_path: "dllm/pipelines/llada/eval.py"
    fast-dllm:
      model: "fastdllm_v2"
      script_path: "dllm/pipelines/fastdllm_v2/eval.py"
    dream-7b:
      model: "dream"
      script_path: "dllm/pipelines/dream/eval.py"
    dream-7b-instruct:
      model: "dream"
      script_path: "dllm/pipelines/dream/eval.py"
  # Mode Shortcuts (Controls multiple intervention flags and loss_type)
  mode:
    base:
      use_puma: False
      use_bptt: False
      use_loopholing: False
      use_cab: False
      loss_type: "mlm"
    puma:
      use_puma: True
      use_bptt: False
      use_loopholing: False
      use_cab: False
      loss_type: "puma"
    puma_bptt:
      use_puma: True
      use_bptt: True
      use_loopholing: False
      use_cab: False
      loss_type: "puma_bptt"
    loophole:
      use_puma: True
      use_loopholing: True
      use_bptt: False
      use_cab: False
      loss_type: "puma"
    loophole_bptt:
      use_puma: True
      use_loopholing: True
      use_bptt: True
      use_cab: False
      loss_type: "puma_bptt"
    cab_all:
      use_puma: True
      use_cab: True
      use_bptt: True
      use_loopholing: False
      loss_type: "puma_bptt"

  epochs:
    small:  { num_train_epochs: 1 }
    medium: { num_train_epochs: 2 }
    large:  { num_train_epochs: 3 }
  
  backbone:
    frozen:    { freeze_backbone: True }
    trainable: { freeze_backbone: False }
    lora:      { freeze_backbone: False, lora: True, r: 64, lora_alpha: 128 }
    unfrozen:  { freeze_backbone: False }  # legacy alias
    full:      { freeze_backbone: False }  # legacy alias
  
  cab_size:
    small:  { cab_bottleneck_dim: 512,  cab_mlp_expansion_dim: 1024 }
    medium: { cab_bottleneck_dim: 1024, cab_mlp_expansion_dim: 2048 }
    large:  { cab_bottleneck_dim: 2048, cab_mlp_expansion_dim: 4096 }

  injection:
    all:    { only_mask_tokens: False }
    masked: { only_mask_tokens: True }

  bptt:
    1: { bptt_steps: 1 }
    2: { bptt_steps: 2 }
    4: { bptt_steps: 4 }
    6: { bptt_steps: 6 }
    8: { bptt_steps: 8 }
