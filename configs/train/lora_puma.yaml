training:
  # ──────────────────────────────────────────────────────────
  # ── Core Model Config ─────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  script_path: "examples/llada/sft.py"
  model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
  bf16: True
  gradient_checkpointing: True
  seed: 42
  ddp_find_unused_parameters: False

  # ──────────────────────────────────────────────────────────
  # ── Method: PUMA (Streaming Unmasking) ────────────────────
  # ──────────────────────────────────────────────────────────
  loss_type: "puma"
  puma_threshold: 0.15             # Target budget per unmasking step
  confidence_type: "top_prob"      # How to prioritize unmasking
  weighted_ce: False               # Cross-entropy weighting
  bptt_steps: 1                    # Single-step memory
  
  lora: True
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: "all-linear"

  # ──────────────────────────────────────────────────────────
  # ── CAB Intervention (Disabled) ───────────────────────────
  # ──────────────────────────────────────────────────────────
  use_cab: False
  
  # ──────────────────────────────────────────────────────────
  # ── Hyperparameters ───────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  num_train_epochs: 2
  learning_rate: 2e-05
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  lr_scheduler_type: "linear"
  warmup_ratio: 0.1

  # ──────────────────────────────────────────────────────────
  # ── Dataset & Formatting ──────────────────────────────────
  # ──────────────────────────────────────────────────────────
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  use_chat_template: True          # Enabled for Tulu-3 Mixture
  mask_prompt_loss: True

  # ──────────────────────────────────────────────────────────
  # ── Logging & Checkpointing ───────────────────────────────
  # ──────────────────────────────────────────────────────────
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_only_model: False
