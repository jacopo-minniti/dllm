training:
  core:
    script_path: "examples/llada/sft.py"
    model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
    bf16: True
    gradient_checkpointing: True
    seed: 42
    ddp_find_unused_parameters: False
    loss_type: "puma"

  lora:
    active: True
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    target_modules: "all-linear"

  puma:
    active: True
    puma_threshold: 0.15

  cab:
    active: False

  loophole:
    active: False

  hyperparameters:
    num_train_epochs: -1
    max_steps: 500
    learning_rate: 2e-05
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    lr_scheduler_type: "linear"
    warmup_ratio: 0.1

  dataset:
    dataset_args: "openai/gsm8k[train:7473,test:1319]"
    use_chat_template: False
    mask_prompt_loss: True

  logging:
    logging_steps: 10
    save_steps: 100
    eval_steps: 50
    save_only_model: False
