training:
  # ──────────────────────────────────────────────────────────
  # ── Core Model Config ─────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  script_path: "examples/llada/sft.py"
  model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
  bf16: True
  gradient_checkpointing: True
  ddp_find_unused_parameters: False

  # ──────────────────────────────────────────────────────────
  # ── Method: PUMA + CAB ───────────────────────────────────
  # ──────────────────────────────────────────────────────────
  loss_type: "puma"                # Streaming PUMA on-policy unmasking
  puma_threshold: 0.15             # Target budget per unmasking step
  bptt_steps: 1                    # Sequence length for BPTT (1 = single step)
  
  use_cab: True                    # Cross-Attention Bridge intervention
  cab_bottleneck_dim: 512
  cab_mlp_expansion_dim: 1024
  
  # ──────────────────────────────────────────────────────────
  # ── LoRA Parameters (Disabled) ────────────────────────────
  # ──────────────────────────────────────────────────────────
  lora: False
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: "all-linear"

  # ──────────────────────────────────────────────────────────
  # ── Hyperparameters ───────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  num_train_epochs: 3
  learning_rate: 1e-05
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 8
  lr_scheduler_type: "linear"
  warmup_ratio: 0.1

  # ──────────────────────────────────────────────────────────
  # ── Dataset & Formatting ──────────────────────────────────
  # ──────────────────────────────────────────────────────────
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  use_chat_template: True
  mask_prompt_loss: True

  # ──────────────────────────────────────────────────────────
  # ── Logging & Checkpointing ───────────────────────────────
  # ──────────────────────────────────────────────────────────
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_only_model: False
