training:
  core:
    script_path: "examples/llada/sft.py"
    model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
    bf16: True
    gradient_checkpointing: True
    seed: 42
    ddp_find_unused_parameters: False
    loss_type: "puma_bptt"

  puma:
    active: True
    puma_threshold: 0.15

  bptt:
    active: True
    bptt_steps: 2

  loophole:
    active: True
    confidence_type: "top_prob"
    weighted_ce: False

  lora:
    active: True
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    target_modules: "all-linear"

  cab:
    active: False

  hyperparameters:
    num_train_epochs: 3
    learning_rate: 2e-05
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 4
    lr_scheduler_type: "linear"
    warmup_ratio: 0.1

  dataset:
    dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
    use_chat_template: True
    mask_prompt_loss: True

  logging:
    logging_steps: 10
    save_steps: 200
    eval_steps: 100
    save_only_model: False
