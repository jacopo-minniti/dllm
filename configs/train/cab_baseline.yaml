# WandB Metadata
wandb:
  name: "cab_baseline_lr2e-4"
  group: "llada-cab-training"
  tags: ["intervention", "cab"]

# Training Hyperparameters
training:
  script_path: "examples/llada/sft.py"
  loss_type: "puma_bptt"
  lora: false
  num_train_epochs: 5
  learning_rate: 2e-4 # Higher LR usually needed for standalone bottleneck adapter
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  logging_steps: 10
  save_steps: 200
  eval_steps: 100
  bf16: true
  gradient_checkpointing: true
  seed: 42
  save_only_model: true
  ddp_find_unused_parameters: false
  
  # Intervention Settings
  puma_threshold: 0.15
  bptt_steps: 2
  use_cab: true
  cab_bottleneck_dim: 128
  cab_mlp_expansion_dim: 512
