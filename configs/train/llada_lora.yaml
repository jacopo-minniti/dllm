training:
  core:
    script_path: "examples/llada/sft.py"
    model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
    bf16: True
    gradient_checkpointing: True
    seed: 42
    ddp_find_unused_parameters: False
    loss_type: "mlm"

  lora:
    active: True
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    target_modules: "all-linear"

  puma:
    active: False
    puma_threshold: 0.0

  cab:
    active: False

  hyperparameters:
    num_train_epochs: 5
    learning_rate: 2e-05
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 8
    lr_scheduler_type: "linear"
    warmup_ratio: 0.1

  dataset:
    dataset_args: "AI-MO/NuminaMath-CoT[train:50000,test:1000]"
    use_chat_template: False
    mask_prompt_loss: True

  logging:
    logging_steps: 10
    save_steps: 200
    eval_steps: 100
    save_only_model: False
