training:
  # Core Model Config
  script_path: "examples/llada/sft.py"
  model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
  bf16: True
  gradient_checkpointing: True
  seed: 42
  ddp_find_unused_parameters: False

  # Method: LoRA Baseline (MLM)
  loss_type: "mlm"                 # Standard LLaDA MLM loss
  lora: True
  r: 32                            # Rank
  lora_alpha: 64                   # Alpha
  lora_dropout: 0.05               # Dropout
  target_modules: "all-linear"     # Targeted blocks

  # PUMA / CAB Interventions
  puma_threshold: 0.0
  use_cab: False
  
  # Hyperparameters
  num_train_epochs: 3
  learning_rate: 2e-05
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  lr_scheduler_type: "linear"
  warmup_ratio: 0.1

  # Dataset & Formatting
  dataset_args: "openai/gsm8k[train:7473,test:1319]"
  use_chat_template: False
  mask_prompt_loss: True

  # Logging & Checkpointing
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  save_only_model: False
