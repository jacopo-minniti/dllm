training:
  core:
    script_path: "examples/llada/sft.py"
    model_name_or_path: "GSAI-ML/LLaDA-8B-Base"
    bf16: True
    gradient_checkpointing: True
    seed: 42
    ddp_find_unused_parameters: False
    loss_type: "puma_bptt"
  
  puma:
    active: True
    puma_threshold: 0.15
  
  bptt:
    active: True
    bptt_steps: 2

  loophole:
    active: False
  
  lora:
    active: False
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    target_modules: "all-linear"
  
  cab:
    active: True
    cab_bottleneck_dim: 1024
    cab_mlp_expansion_dim: 2048
    read_layer: 15
  
  hyperparameters:
    num_train_epochs: 1
    learning_rate: 5e-05
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 8
    lr_scheduler_type: "linear"
    warmup_ratio: 0.1
    max_grad_norm: 1.5
  
  dataset:
    # "AI-MO/NuminaMath-CoT[train:50000,test:1000]"
    # "allenai/tulu-3-sft-mixture[train:50000,test:5000]"
    dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:1000]"
    use_chat_template: False
    mask_prompt_loss: True
  
  logging:
    logging_steps: 10
    save_steps: 100
    eval_steps: 50
    save_only_model: False

  stability:
    ignore_data_skip: False
