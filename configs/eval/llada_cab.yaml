evaluation:
  # Evaluation Harness
  script_path: "dllm/pipelines/llada/eval.py"
  tasks: "math500_reasoning"
  num_fewshot: 4
  batch_size: 2
  seed: 42
  device: "cuda"
  apply_chat_template: False
  log_samples: True

  # Model Configuration
  model: "llada"
  model_args:
    pretrained: ".models/llada-base-gsm8k-cab-puma/lr2e-05_bs32_puma-th0.15_cab-b512-e1024/checkpoint-500"
    dtype: "bfloat16"
    
    lora: False
    merge_lora: False
    
    # Interventions (Disabled/Baseline)
    # Set threshold > 0 and use_loopholing: True to enable PUMA inference
    use_cab: True
    cab_bottleneck_dim: 512   
    cab_mlp_expansion_dim: 1024 

    use_loopholing: True
    threshold: 0.15

    # Sampling Strategy
    max_new_tokens: 512
    steps: 256          
    block_size: 32
    temperature: 0.0    
    remasking: "low_confidence"