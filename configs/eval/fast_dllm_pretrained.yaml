evaluation:
  eval_model: fast-dllm
  tasks: "math500_reasoning"
  apply_chat_template: False
  num_fewshot: 4
  model_args:
    pretrained: "Efficient-Large-Model/Fast_dLLM_v2_1.5B"
    # No use_loopholing key: the model's own config.json (use_loopholing: True) is respected.
    # This evaluates the pretrained model exactly as it was trained, with no fine-tuning overlaid.
