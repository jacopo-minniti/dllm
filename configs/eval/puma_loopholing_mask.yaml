evaluation:
  # Evaluation Harness
  script_path: "dllm/pipelines/llada/eval.py"
  tasks: "math50_reasoning"
  num_fewshot: 4
  batch_size: 8
  seed: 42
  device: "cuda"
  apply_chat_template: False
  log_samples: True

  # Model Configuration
  model: "llada"
  model_args:
    pretrained: ".models/LLaDA-8B-Base/tulu-3-sft-mixture/base-loophole-puma-bptt/lr2e-05_bs256_puma-th0.15_bptt2_loop-mask-mlp-rl15/checkpoint-final"
    dtype: "bfloat16"
    
    lora: False
    merge_lora: False
    
    # Interventions
    use_cab: False
    
    use_loopholing: True
    only_mask_tokens: True
    mlp_module: True
    read_layer: 15
    threshold: 0.15

    # Sampling Strategy
    max_new_tokens: 512
    steps: 256          
    block_size: 32
    temperature: 0.0
    remasking: "low_confidence"
