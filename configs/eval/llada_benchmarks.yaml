# Evaluation Configuration
evaluation:
  script_path: "dllm/pipelines/llada/eval.py"
  model: "llada"
  # Multiple tasks for a broader view
  tasks: "hendrycks_math500,gsm8k_cot,arc_challenge,hellaswag"
  batch_size: 4
  device: "cuda"
  output_path: "./.evals/llada_benchmarks"
  apply_chat_template: true
  num_fewshot: 0
  log_samples: true
  
  model_args:
    pretrained: "GSAI-ML/LLaDA-8B-Base"
    dtype: "bfloat16"
    max_new_tokens: 1024
    steps: 1024
    block_size: 1024

  wandb_args:
    name: "llada-benchmarks-eval"
    group: "eval"
    tags: "baseline,multi-task"
