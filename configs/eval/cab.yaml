evaluation:
  # ──────────────────────────────────────────────────────────
  # ── Evaluation Harness ────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  script_path: "dllm/pipelines/llada/eval.py"
  tasks: "math500_reasoning"
  num_fewshot: 0
  batch_size: 1
  seed: 42
  device: "cuda"
  apply_chat_template: True
  log_samples: True

  # ──────────────────────────────────────────────────────────
  # ── Model Configuration ───────────────────────────────────
  # ──────────────────────────────────────────────────────────
  model: "llada"
  model_args:
    pretrained: ".models/llada-tulu3-cab-puma/lr1e-5_bs128_puma-th0.15_cab-b512-e1024/checkpoint-100"
    dtype: "bfloat16"
    
    # Active Interventions
    use_cab: True                  # Cross-Attention Bridge module
    cab_bottleneck_dim: 512
    cab_mlp_expansion_dim: 1024
    
    use_loopholing: True           # Persistent state-carrying (h_t)
    lora: False                    # Checkpoint is full-parameter (CAB-only trained)
    merge_lora: False
    
    # ──────────────────────────────────────────────────────────
    # ── Sampling Strategy ─────────────────────────────────────
    # ──────────────────────────────────────────────────────────
    max_new_tokens: 512
    steps: 512                     # Diffusion steps
    block_size: 32                 # Chunk size for parallel unmasking
    temperature: 0.7
    threshold: 0.15                # PUMA dynamic stopping (Set 0 to disable)
    confidence_type: "top_prob"
