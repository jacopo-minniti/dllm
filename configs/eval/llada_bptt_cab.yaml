evaluation:
  # Evaluation Harness (LLaDA Math500)
  script_path: "dllm/pipelines/llada/eval.py"
  tasks: "math500_reasoning"
  num_fewshot: 4
  batch_size: 4
  seed: 42
  device: "cuda"
  apply_chat_template: False
  log_samples: True

  # Model Configuration
  model: "llada"
  model_args:
    pretrained: ".models/llada-base-gsm8k-bptt-cab/lr2e-05_bs256_bptt2_cab-b512-e1024/checkpoint-100"
    dtype: "bfloat16"
    lora: False
    
    # Bridge Intervention (Must match training dims)
    use_cab: True
    cab_bottleneck_dim: 512   
    cab_mlp_expansion_dim: 1024 

    # Inference Memory (Loopholing carries CAB state over steps)
    use_loopholing: True
    threshold: 0.0
    confidence_type: "top_prob"

    # Sampling Strategy
    max_new_tokens: 512
    steps: 256                      
    block_size: 32                  # Unmasks in chunks of 32
    temperature: 0.0                # Greedy decoding for reasoning
    remasking: "low_confidence"     # Essential for LLaDA refinement
