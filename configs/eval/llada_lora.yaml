evaluation:
  # ──────────────────────────────────────────────────────────
  # ── Evaluation Harness ────────────────────────────────────
  # ──────────────────────────────────────────────────────────
  script_path: "dllm/pipelines/llada/eval.py"
  tasks: "math500_reasoning"
  num_fewshot: 4
  batch_size: 4
  seed: 42
  device: "cuda"
  apply_chat_template: False
  log_samples: True

  # ──────────────────────────────────────────────────────────
  # ── Model Configuration ───────────────────────────────────
  # ──────────────────────────────────────────────────────────
  model: "llada"
  model_args:
    pretrained: ".models/llada-base-gsm8k-lora/lr2e-05_bs32_lora-r32-a64/checkpoint-600"
    dtype: "bfloat16"
    
    lora: True
    merge_lora: True
    
    # Interventions (Disabled/Baseline)
    # Set threshold > 0 and use_loopholing: True to enable PUMA inference
    use_cab: False
    use_loopholing: False
    threshold: 0.0

    # Sampling Strategy
    max_new_tokens: 512
    steps: 256          
    block_size: 32
    temperature: 0.0    
    remasking: "low_confidence"