# WandB Metadata
wandb:
  name: "llada-puma-bptt-sft"
  group: "llada-intervention"
  tags: ["puma", "bptt", "intervention"]

# Training Hyperparameters
training:
  script_path: "examples/llada/sft.py"
  loss_type: "puma_bptt"
  lora: true
  num_train_epochs: 4
  learning_rate: 2e-5
  per_device_train_batch_size: 4
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  bf16: true
  gradient_checkpointing: true
  save_only_model: false
  ddp_find_unused_parameters: false
  
  # Intervention Settings
  puma_threshold: 0.15
  bptt_steps: 2
