# WandB Metadata
wandb:
  name: "llada-8b-sft"
  group: "llada-sft"
  tags: ["baseline", "sft"]

# Training Hyperparameters
training:
  script_path: "examples/llada/sft.py"
  loss_type: "mlm"
  lora: true
  num_train_epochs: 4
  learning_rate: 2e-5
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  bf16: true
  gradient_checkpointing: true
  seed: 42
  save_only_model: false
  ddp_find_unused_parameters: false
