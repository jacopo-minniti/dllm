# WandB Metadata
wandb:
  name: "test"
  group: "llada-lora-tulu3"
  tags: ["puma", "bptt"]

# Training Hyperparameters (passed to sft.py)
training:
  script_path: "examples/llada/sft.py"
  loss_type: "puma_bptt"
  puma_threshold: 0.15
  use_loopholing: true
  bptt_steps: 2
  lora: true
  num_train_epochs: 4
  learning_rate: 1e-5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  dataset_args: "allenai/tulu-3-sft-mixture[train:50000,test:10000]"
  lr_scheduler_type: "linear"
  warmup_ratio: 0.05
  logging_steps: 1
  save_steps: 100
  eval_steps: 100
  bf16: true
  seed: 1234
